<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contáctanos</title>
    <link rel="stylesheet" href="https://necolas.github.io/normalize.css/8.0.1/normalize.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main>
        <form id="contactoForm" class="formulario" novalidate>
            <h3>Contacto</h3>

            <div class="formulario__grupo" id="grupo__nombre">
                <label for="nombre" class="formulario__label">Nombre completo</label>
                <div class="formulario__grupo-input">
                    <input type="text" id="nombre" name="nombre" class="formulario__input" placeholder="Nombre Completo" required>
                    <i class="formulario__validacion-estado fas fa-times-circle"></i>
                </div>
                <p class="formulario__input-error">Ingresa un nombre válido (letras y espacios, hasta 40 caracteres).</p>
            </div>

            <div class="formulario__grupo" id="grupo__asunto">
                <label for="asunto" class="formulario__label">Asunto</label>
                <div class="formulario__grupo-input">
                    <input type="text" id="asunto" name="asunto" class="formulario__input" placeholder="Asunto" required>
                    <i class="formulario__validacion-estado fas fa-times-circle"></i>
                </div>
                <p class="formulario__input-error">El asunto no puede estar vacío.</p>
            </div>

            <div class="formulario__grupo" id="grupo__mensaje">
                <label for="mensaje" class="formulario__label">Mensaje</label>
                <div class="formulario__grupo-input">
                    <textarea id="mensaje" name="mensaje" class="formulario__input" placeholder="Escribe tu mensaje..." rows="5" maxlength="300" required style="height:120px;padding-top:12px"></textarea>
                    <i class="formulario__validacion-estado fas fa-times-circle"></i>
                </div>
                <p class="formulario__input-error">El mensaje debe tener entre 10 y 300 caracteres.</p>
                <div class="formulario__grupo formulario__grupo-btn-enviar" style="margin-top:8px">
                    <div class="form-text" style="margin-bottom:8px"><span id="mensajeCounter">0</span>/300</div>
                </div>
            </div>

            <p id="contactoSuccess" class="formulario__input-error" style="display:none; color: #119200;">Formulario enviado correctamente.</p>

            <div class="formulario__grupo formulario__grupo-btn-enviar">
                <button type="submit" class="formulario__btn">Enviar</button>
            </div>
        </form>
    </main>

    <script src="js/contacto.js"></script>
</body>
</html>
