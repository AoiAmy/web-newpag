<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Productos - Tienda</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="logo"><a href="index.html">Mi Tienda</a></div>
      <nav>
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="productos.html">Productos</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Productos</h1>
      <p>Elige tus productos, ajusta cantidades y revisa tu carrito.</p>
    </section>

    <div class="products-wrap">
      <div>
        <div class="products-grid" id="products"></div>
      </div>

      <aside class="cart" aria-labelledby="cart-title">
        <h3 id="cart-title">Carrito</h3>
        <div class="cart-items" id="cart-items">
          <div class="empty">El carrito está vacío.</div>
        </div>
        <div class="cart-total">
          <span>Total:</span>
          <span id="cart-total">$0.00</span>
        </div>
        <div style="margin-top:.75rem">
          <button id="checkout" class="btn-add">Pagar</button>
        </div>
      </aside>
    </div>
  </main>

  <script src="js/cart.js"></script>
</body>
</html>
